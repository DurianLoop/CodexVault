<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Codex Vault architecture</title>
  <desc id="desc">A diagram of the Codex Vault local-first architecture from .codex scan to export packs and backend API lab.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#101827"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="line" x1="100" y1="0" x2="1100" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#30E7C5"/>
      <stop offset="1" stop-color="#58A6FF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="560" rx="28" fill="#07111F"/>
  <g opacity="0.12">
    <path d="M70 70H1130M70 140H1130M70 210H1130M70 280H1130M70 350H1130M70 420H1130M70 490H1130" stroke="#E2E8F0"/>
    <path d="M120 45V515M220 45V515M320 45V515M420 45V515M520 45V515M620 45V515M720 45V515M820 45V515M920 45V515M1020 45V515M1120 45V515" stroke="#E2E8F0"/>
  </g>
  <text x="80" y="84" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial" font-size="38" font-weight="800">Local-first v0.1 architecture</text>
  <text x="80" y="122" fill="#94A3B8" font-family="Inter, Segoe UI, Arial" font-size="18">Scan, summarize, protect, export, import, and prepare for real sync.</text>
  <path d="M280 290H458M742 290H920M600 214V150M600 366V438" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
  <g transform="translate(80 210)">
    <rect width="200" height="160" rx="22" fill="url(#panel)" stroke="#1F2937"/>
    <text x="26" y="48" fill="#30E7C5" font-family="Inter, Segoe UI, Arial" font-size="17" font-weight="800">.codex</text>
    <text x="26" y="82" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial" font-size="15">skills</text>
    <text x="26" y="108" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial" font-size="15">memory</text>
    <text x="26" y="134" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial" font-size="15">prompts</text>
  </g>
  <g transform="translate(458 190)">
    <rect width="284" height="200" rx="26" fill="url(#panel)" stroke="#2DD4BF"/>
    <text x="30" y="54" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial" font-size="23" font-weight="800">Codex Vault UI</text>
    <text x="30" y="92" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial" font-size="15">skill validation</text>
    <text x="30" y="120" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial" font-size="15">read-only memory preview</text>
    <text x="30" y="148" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial" font-size="15">achievement details</text>
    <rect x="30" y="166" width="168" height="8" rx="4" fill="#1E293B"/>
    <rect x="30" y="166" width="118" height="8" rx="4" fill="#30E7C5"/>
  </g>
  <g transform="translate(920 210)">
    <rect width="200" height="160" rx="22" fill="url(#panel)" stroke="#1F2937"/>
    <text x="26" y="48" fill="#58A6FF" font-family="Inter, Segoe UI, Arial" font-size="17" font-weight="800">Safe Pack</text>
    <text x="26" y="82" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial" font-size="15">manifest</text>
    <text x="26" y="108" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial" font-size="15">backup</text>
    <text x="26" y="134" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial" font-size="15">share code</text>
  </g>
  <g transform="translate(470 56)">
    <rect width="260" height="94" rx="20" fill="#0F1B2D" stroke="#334155"/>
    <text x="26" y="40" fill="#FACC15" font-family="Inter, Segoe UI, Arial" font-size="18" font-weight="800">Sensitive Filter</text>
    <text x="26" y="68" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial" font-size="14">tokens, auth, caches out</text>
  </g>
  <g transform="translate(470 438)">
    <rect width="260" height="94" rx="20" fill="#0F1B2D" stroke="#334155"/>
    <text x="26" y="40" fill="#A78BFA" font-family="Inter, Segoe UI, Arial" font-size="18" font-weight="800">Backend API Lab</text>
    <text x="26" y="68" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial" font-size="14">SQLite sync prototype</text>
  </g>
