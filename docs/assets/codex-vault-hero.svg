<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Codex Vault dashboard illustration</title>
  <desc id="desc">A dark desktop dashboard showing Codex assets, backup packs, and achievements.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#102A2C"/>
    </linearGradient>
    <linearGradient id="cyan" x1="120" y1="60" x2="980" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#30E7C5"/>
      <stop offset="1" stop-color="#58A6FF"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.188 0 0 0 0 0.906 0 0 0 0 0.773 0 0 0 0.45 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <path d="M0 410 C180 350 250 500 430 430 C610 360 690 280 870 330 C990 365 1080 320 1200 245 V520 H0 V410Z" fill="#0E766E" opacity="0.18"/>
  <g opacity="0.16">
    <path d="M80 80H1120M80 140H1120M80 200H1120M80 260H1120M80 320H1120M80 380H1120M80 440H1120" stroke="#E5E7EB"/>
    <path d="M120 50V470M220 50V470M320 50V470M420 50V470M520 50V470M620 50V470M720 50V470M820 50V470M920 50V470M1020 50V470" stroke="#E5E7EB"/>
  </g>
  <g transform="translate(72 70)">
    <text x="0" y="30" fill="#30E7C5" font-family="Inter, Segoe UI, Arial" font-size="17" font-weight="700" letter-spacing="3">V0.1 INTERNAL BETA</text>
    <text x="0" y="96" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial" font-size="58" font-weight="800">Codex Vault</text>
    <text x="0" y="142" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial" font-size="24">A local-first desktop vault for your .codex assets.</text>
    <g transform="translate(0 190)">
      <rect width="210" height="52" rx="12" fill="#30E7C5" opacity="0.15" stroke="#30E7C5"/>
      <text x="22" y="34" fill="#D1FAE5" font-family="Inter, Segoe UI, Arial" font-size="18" font-weight="700">Scan Skills</text>
      <rect x="235" width="235" height="52" rx="12" fill="#58A6FF" opacity="0.14" stroke="#58A6FF"/>
      <text x="257" y="34" fill="#DBEAFE" font-family="Inter, Segoe UI, Arial" font-size="18" font-weight="700">Export Packs</text>
      <rect x="495" width="260" height="52" rx="12" fill="#FACC15" opacity="0.12" stroke="#FACC15"/>
      <text x="517" y="34" fill="#FEF9C3" font-family="Inter, Segoe UI, Arial" font-size="18" font-weight="700">Unlock Achievements</text>
    </g>
  </g>
  <g transform="translate(730 72)" filter="url(#glow)">
    <rect width="386" height="354" rx="24" fill="#0B1220" stroke="#2DD4BF"/>
    <rect x="22" y="24" width="342" height="62" rx="14" fill="#111827" stroke="#1F2937"/>
    <circle cx="48" cy="55" r="10" fill="#30E7C5"/>
    <text x="72" y="61" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial" font-size="19" font-weight="700">Workspace Health</text>
    <rect x="22" y="110" width="156" height="92" rx="16" fill="#101827" stroke="#293445"/>
    <text x="42" y="146" fill="#94A3B8" font-family="Inter, Segoe UI, Arial" font-size="14">Skills</text>
    <text x="42" y="180" fill="#30E7C5" font-family="Inter, Segoe UI, Arial" font-size="32" font-weight="800">8 / 7</text>
    <rect x="208" y="110" width="156" height="92" rx="16" fill="#101827" stroke="#293445"/>
    <text x="228" y="146" fill="#94A3B8" font-family="Inter, Segoe UI, Arial" font-size="14">Memory</text>
    <text x="228" y="180" fill="#58A6FF" font-family="Inter, Segoe UI, Arial" font-size="32" font-weight="800">11</text>
    <rect x="22" y="226" width="342" height="104" rx="18" fill="#101827" stroke="#293445"/>
    <text x="44" y="260" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial" font-size="18" font-weight="700">Achievement Unlocked</text>
    <text x="44" y="292" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial" font-size="15">Binary Cartographer</text>
    <rect x="44" y="306" width="230" height="8" rx="4" fill="#1E293B"/>
    <rect x="44" y="306" width="168" height="8" rx="4" fill="url(#cyan)"/>
  </g>
</svg>

